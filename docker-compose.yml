# docker-compose.yml
version: '3.8'

services:
  api:
    build: .
    container_name: grievance_api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/artifacts
      - LOG_LEVEL=INFO
    volumes:
      - ./artifacts:/app/artifacts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s